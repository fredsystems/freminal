# Freminal Configuration File
# This file controls fonts, cursor behavior, theme, and more.
# All values are optional; missing items fall back to sensible defaults.
#
# To customize, copy this file to:
#   Linux:   ~/.config/freminal/config.toml
#   macOS:   ~/Library/Application Support/Freminal/config.toml
#   Windows: %APPDATA%\Freminal\config.toml
#
# Schema version (incremented when breaking changes occur)
version = 1

## ##############################################################################
# FONT SETTINGS
## ##############################################################################
[font]
# Primary terminal font family
family = "CaskaydiaCove Nerd Font"

# Font size in points
size = 12.0

# Enable OpenType ligatures (liga, clig).
# Programming fonts like JetBrains Mono, Fira Code, and Cascadia Code
# contain ligatures for sequences like ->, =>, !=, >=, etc.
ligatures = true

## ##############################################################################
# CURSOR SETTINGS
## ##############################################################################
[cursor]
# Cursor shape:
#   block
#   underline
#   bar
shape = "block"

# Whether the cursor should blink
blink = true

# Smooth cursor trail animation (cursor glides to new position)
trail = false

# Duration of the cursor trail animation in milliseconds
trail_duration_ms = 150

## ##############################################################################
# THEME SETTINGS
## ##############################################################################
[theme]
# How to choose between the dark and light theme.
# Values: "dark" (always use dark_name), "light" (always use light_name),
#         "auto" (follow the OS light/dark preference).
mode = "dark"

# Theme to use when mode = "dark", or as the dark variant when mode = "auto".
#
# Available theme slugs:
#   catppuccin-mocha      catppuccin-macchiato   catppuccin-frappe
#   catppuccin-latte      dracula                nord
#   solarized-dark        solarized-light        gruvbox-dark
#   gruvbox-light         one-dark               one-light
#   tokyo-night           tokyo-night-storm      kanagawa
#   rose-pine             rose-pine-moon         rose-pine-dawn
#   monokai-pro           ayu-dark               ayu-light
#   everforest-dark       everforest-light       material-dark
#   ghostty-default       wezterm-default        xterm-default
dark_name = "catppuccin-mocha"

# Theme to use when mode = "light", or as the light variant when mode = "auto".
light_name = "catppuccin-latte"

# Backward-compatible alias: if you previously had `name = "..."`, that
# continues to work and is treated as the dark theme name.
# Prefer `dark_name` going forward.
# name = "catppuccin-mocha"

## ##############################################################################
# SHELL SETTINGS
## ##############################################################################
[shell]
# Default shell to launch. If omitted, the system default shell is used.
# This can be overridden at runtime with the --shell CLI flag.
# path = "/bin/zsh"

## ##############################################################################
# LOGGING SETTINGS
## ##############################################################################
[logging]
# Log level for file output. Logs are always written to the platform
# log directory:
#   Linux:   ~/.local/state/freminal/
#   macOS:   ~/Library/Logs/Freminal/
#   Windows: %LOCALAPPDATA%\Freminal\logs\
#
# Valid levels: "trace", "debug", "info", "warn", "error"
# Default: "debug"
#
# To view logs in real time:
#   tail -f ~/.local/state/freminal/freminal.YYYY-MM-DD.log
#
# Log files are rotated daily and kept for 7 days.
# level = "debug"

## ##############################################################################
# SCROLLBACK SETTINGS
## ##############################################################################
[scrollback]
# Maximum number of scrollback lines to keep in the buffer.
# Must be between 1 and 100000.
limit = 4000

## ##############################################################################
# UI SETTINGS
## ##############################################################################
[ui]
# Hide the menu bar at the top of the window.
# Can also be set via the --hide-menu-bar CLI flag.
# hide_menu_bar = false

# Background opacity (0.0 = fully transparent, 1.0 = fully opaque).
# Default and colored cell backgrounds are affected.
# Text, images, cursor, selection highlights, underlines, and strikethrough
# remain fully opaque.
#
# Note: On X11, transparency requires a running compositor (e.g. picom).
# Without a compositor, transparent areas will render as black.
#
# background_opacity = 1.0

# Path to a background image displayed behind the terminal grid.
# Supported formats: PNG, JPEG, WebP.
# Unset (or commented out) disables the background image entirely.
#
# background_image = "/path/to/image.png"

# How to fit the background image within the terminal viewport.
#   "fill"  — stretch to fill the viewport, ignoring aspect ratio
#   "fit"   — scale to fit within the viewport (letterboxed)
#   "cover" — scale to cover the viewport, cropping excess (default)
#   "tile"  — repeat the image in both dimensions
#
# background_image_mode = "cover"

# Opacity of the background image (0.0–1.0).
# Applied on top of the image itself; background_opacity then layers over that.
# Default: 0.5
#
# background_image_opacity = 0.5

# Automatically detect plain URLs (http, https, file, ftp, mailto) in terminal
# output and make them clickable, in addition to OSC 8 hyperlinks. When an
# OSC 8 link covers the same cells as an auto-detected URL, the OSC 8 link
# wins.
# Default: true
#
# auto_detect_urls = true

## ##############################################################################
# SHADER SETTINGS
## ##############################################################################
[shader]
# Path to a custom GLSL fragment shader for post-processing effects.
# When set, the terminal is rendered to an offscreen framebuffer and the
# shader is applied as a fullscreen pass.
#
# The shader receives these uniforms:
#   uniform sampler2D u_terminal   — the terminal framebuffer texture
#   uniform vec2      u_resolution — viewport size in pixels
#   uniform float     u_time       — elapsed time in seconds (for animations)
#
# Bundled examples can be found in shaders/examples/:
#   crt.frag         — CRT scanlines + vignette + chromatic aberration
#   bloom.frag       — soft glow around bright text
#   grayscale.frag   — convert output to grayscale
#   retro_amber.frag — amber phosphor monochrome look
#
# When this option is not set, the terminal renders directly to the screen
# with no framebuffer overhead.
#
# path = "/path/to/shader.frag"

# Reload and recompile the shader automatically when the file changes.
# Default: true. If compilation fails, the previous working shader stays active.
#
# hot_reload = true

## ##############################################################################
# TAB SETTINGS
## ##############################################################################
[tabs]
# Whether to show the tab bar when only one tab is open.
# Default: false (tab bar appears only when multiple tabs are open).
# show_single_tab = false

# Position of the tab bar: "top" or "bottom".
# Default: "top"
# position = "top"

## ##############################################################################
# BELL SETTINGS
## ##############################################################################
[bell]
# How the terminal responds to a bell character (\x07).
# Options:
#   "visual" - flash the terminal area briefly
#   "none"   - ignore the bell
#   "audio"  - best-effort system beep (stderr BEL on Linux, NSBeep on
#              macOS, MessageBeep on Windows)
#   "both"   - both visual flash and system beep
# Default: "visual"
# mode = "visual"

## ##############################################################################
# SECURITY SETTINGS
## ##############################################################################
[security]
# Allow applications to read the system clipboard via OSC 52 query.
# Default: false (clipboard reads return an empty response).
# When true, OSC 52 queries return the current clipboard contents
# base64-encoded. This is a potential security risk if untrusted programs
# run inside the terminal.
# allow_clipboard_read = false

# Show a lock icon in the tab bar when the foreground process disables
# terminal echo (e.g. password prompts from sudo, ssh, passwd).
# Default: true.
# password_indicator = true

## ##############################################################################
# SHELL INTEGRATION (OSC 133)
## ##############################################################################
[shell_integration]
# When true, Freminal sets TERM_PROGRAM=freminal and TERM_PROGRAM_VERSION
# in the PTY environment so shell scripts can detect Freminal, AND injects
# the env needed to auto-load Freminal's bundled bash/zsh/fish integration
# scripts at PTY spawn time.  The scripts emit OSC 133 prompt/command markers
# so the terminal can render command blocks, gutters, and notifications.
# No manual sourcing is required.
# Default: true.
# set_term_program = true

## ##############################################################################
# COMMAND BLOCKS (OSC 133 visualization)
## ##############################################################################
[command_blocks]
# Master switch for command-block visualization.
# When false, OSC 133 markers are still parsed but no gutters, duration
# overlays, or fold/collapse affordances appear in the UI.
# Default: true.
# enabled = true

# Display the duration of long-running commands next to the gutter
# (e.g. "1.3s", "15ms").
# Default: true.
# show_duration = true

# Minimum command duration in seconds before a duration label is rendered.
# Below this threshold the label is suppressed to avoid flicker on fast
# commands.
# Default: 2.0.
# duration_threshold_secs = 2.0

## ##############################################################################
# STARTUP & LAYOUTS
## ##############################################################################

[startup]
# Name of a layout file to load on startup. If the value contains a path
# separator it is treated as a file path; otherwise Freminal looks for
# ~/.config/freminal/layouts/<name>.toml.
# Overridden by the --layout CLI flag.
# Default: unset (open a single default pane).
# layout = "dev"

# When true, Freminal saves the current layout topology on exit and restores
# it on the next launch (unless --layout is given on the command line).
# The layout is written to ~/.config/freminal/layouts/last_session.toml.
# Default: true.
# restore_last_session = true

## ##############################################################################
# ONBOARDING (DEPRECATED — kept for backward compatibility)
## ##############################################################################
# The first-run welcome overlay flag used to live in this section.  It now
# lives in `state.toml` under $XDG_STATE_HOME/freminal/ (Linux),
# ~/Library/Application Support/Freminal/ (macOS), or %APPDATA%\Freminal\
# (Windows), so managed installs with a read-only config.toml (NixOS
# home-manager, system-wide configs) can still record the dismissal.
#
# A `first_run_complete = true` value here is still honored on first launch
# with a new binary — it is migrated forward into state.toml — but new code
# does not write to this section.  You can re-open the overlay at any time
# via Help → Show Welcome.
#
# To reset onboarding, delete state.toml from the platform's state directory
# (NOT this config file).
# [onboarding]
# first_run_complete = false

## ##############################################################################
# KEY BINDINGS
## ##############################################################################
# Override the default key bindings. Each key is an action name, and the value
# is the key combo string (e.g. "Ctrl+Shift+C"). Set to "none" to disable an
# action's binding.
#
# Only overridden actions need to be listed — omitted actions keep their
# defaults. Modifier names: Ctrl, Shift, Alt (also: Command, Option as aliases).
#
# Available actions (with their defaults):
#
#   Tab management:
#     new_tab         = "Ctrl+Shift+T"
#     close_tab       = (unbound)           (reassigned to close_pane; configure manually)
#     next_tab        = "Ctrl+Tab"
#     prev_tab        = "Ctrl+Shift+Tab"
#     switch_to_tab_1 = "Ctrl+Shift+1"  (through switch_to_tab_9)
#     move_tab_left   = (unbound)
#     move_tab_right  = (unbound)
#     rename_tab      = (unbound)
#
#   Clipboard:
#     copy            = "Ctrl+Shift+C"
#     paste           = "Ctrl+Shift+V"
#     select_all      = (unbound)
#
#   Search:
#     open_search     = "Ctrl+Shift+F"
#     search_next     = (unbound, Enter in search bar)
#     search_prev     = (unbound, Shift+Enter in search bar)
#     prev_command    = "Ctrl+Shift+Up"
#     next_command    = "Ctrl+Shift+Down"
#
#   Font zoom:
#     zoom_in         = "Ctrl+Equals"  (also "Ctrl+Plus")
#     zoom_out        = "Ctrl+Minus"
#     zoom_reset      = "Ctrl+0"
#
#   UI:
#     toggle_menu_bar = (unbound)
#     open_settings   = "Ctrl+Shift+Comma"
#
#   Window management:
#     new_window      = "Ctrl+Shift+N"  (open a new OS window with an initial tab)
#
#   Scrollback:
#     scroll_page_up   = "Shift+PageUp"
#     scroll_page_down = "Shift+PageDown"
#     scroll_to_top    = "Shift+Home"
#     scroll_to_bottom = "Shift+End"
#     scroll_line_up   = "Shift+Up"
#     scroll_line_down = "Shift+Down"
#     clear_scrollback = "Ctrl+Shift+Backspace"  (erase scrollback; leaves visible display)
#
#   Command-block folding (OSC 133):
#     fold_previous_command = ""              (unbound — no default to avoid conflicting with open_search)
#     fold_all              = ""              (unbound — opt-in)
#     unfold_all            = "Ctrl+Shift+U"  (unfold every folded command block in this pane)
#
#   Command history (Task 72.15):
#     show_command_history = "Ctrl+Shift+M"  (open the Quick Command History Palette;
#                                             selecting an entry inserts it on the prompt
#                                             without sending Enter)
#
#   Pane management:
#     split_vertical   = "Ctrl+Shift+Pipe"   (split focused pane left | right)
#     split_horizontal = "Ctrl+Shift+Minus"  (split focused pane top / bottom)
#     close_pane       = "Ctrl+Shift+W"      (close focused pane; last pane closes tab)
#     focus_pane_left  = "Ctrl+Shift+H"      (move focus left)
#     focus_pane_down  = "Ctrl+Shift+J"      (move focus down)
#     focus_pane_up    = "Ctrl+Shift+K"      (move focus up)
#     focus_pane_right = "Ctrl+Shift+L"      (move focus right)
#     resize_pane_left  = "Ctrl+Alt+H"       (shrink pane leftward)
#     resize_pane_down  = "Ctrl+Alt+J"       (grow pane downward)
#     resize_pane_up    = "Ctrl+Alt+K"       (shrink pane upward)
#     resize_pane_right = "Ctrl+Alt+L"       (grow pane rightward)
#     zoom_pane        = "Ctrl+Shift+Z"      (toggle zoom on focused pane)
#
#   Session:
#     toggle_recording = "Ctrl+Shift+R"      (start/stop FREC v2 session recording)
#
#   Configuration:
#     reload_config  = (no default)         (re-read config.toml from disk and
#                                            apply every change live; available
#                                            from the Session menu)
#
# Example: remap copy/paste to Ctrl+C / Ctrl+V (warning: this will prevent
# Ctrl+C from sending SIGINT to the running program):
#
# [keybindings]
# copy = "Ctrl+C"
# paste = "Ctrl+V"

## ##############################################################################
# MANAGED-BY MARKER (do not set manually)
## ##############################################################################
# The `managed_by` field is injected automatically by external config managers
# such as Nix home-manager.  When present, the settings modal opens in
# read-only mode with a message explaining that changes must be made through
# the managing tool.
#
# Do NOT set this field manually — it is only meaningful when a config manager
# owns the file.
#
# managed_by = "home-manager"

## ##############################################################################
# NIX / HOME-MANAGER USAGE
## ##############################################################################
# If you use Nix with home-manager, Freminal can generate this config file
# declaratively. Add the flake and enable the module:
#
#   # flake.nix
#   {
#     inputs.freminal.url = "github:FredSystems/freminal";
#
#     outputs = { nixpkgs, freminal, ... }: {
#       # Option A: use the overlay so pkgs.freminal is available everywhere
#       nixpkgs.overlays = [ freminal.overlays.default ];
#
#       # Option B: import the home-manager module directly
#       homeConfigurations."user" = home-manager.lib.homeManagerConfiguration {
#         modules = [
#           freminal.homeManagerModules.default
#           {
#             programs.freminal = {
#               enable = true;
#               settings = {
#                 font.family = "JetBrainsMono Nerd Font";
#                 font.size = 14.0;
#                 cursor.shape = "bar";
#                 cursor.blink = false;
#                 theme.name = "catppuccin-mocha";
#                 scrollback.limit = 10000;
#                 shell.path = "/run/current-system/sw/bin/zsh";
#               };
#             };
#           }
#         ];
#       };
#     };
#   }
#
# This generates ~/.config/freminal/config.toml automatically.
# Null/unset values are omitted; Freminal uses built-in defaults for them.
