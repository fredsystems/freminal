<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Freminal logo</title>
  <desc id="desc">Catppuccin Mocha inspired terminal emulator logo with a rounded app icon, prompt chevron, cursor, and Freminal wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181825"/>
      <stop offset="1" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="mauve" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cba6f7"/>
      <stop offset="1" stop-color="#b4befe"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5c2e7"/>
      <stop offset="1" stop-color="#f38ba8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#11111b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <rect x="128" y="108" width="768" height="768" rx="150" fill="url(#surface)" stroke="#6c7086" stroke-width="14"/>
    <rect x="150" y="130" width="724" height="724" rx="130" fill="none" stroke="#313244" stroke-width="4" opacity="0.75"/>
  </g>

  <!-- terminal prompt -->
  <path d="M326 292 L474 440 L326 588" fill="none" stroke="url(#mauve)" stroke-width="74" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cursor -->
  <rect x="538" y="548" width="258" height="58" rx="29" fill="url(#pink)"/>

  <!-- wordmark -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="86" font-weight="800" text-anchor="middle">
    <text x="263" y="728" fill="#f5c2e7">f</text>
    <text x="341" y="728" fill="#f38ba8">r</text>
    <text x="419" y="728" fill="#f9e2af">e</text>
    <text x="497" y="728" fill="#a6e3a1">m</text>
    <text x="575" y="728" fill="#89b4fa">i</text>
    <text x="653" y="728" fill="#cba6f7">n</text>
    <text x="731" y="728" fill="#b4befe">a</text>
    <text x="809" y="728" fill="#cdd6f4">l</text>
  </g>

  <!-- small tagline -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="38" font-weight="700" text-anchor="middle">
    <text x="280" y="940" fill="#cba6f7">Fast.</text>
    <text x="512" y="940" fill="#f5c2e7">Lightweight.</text>
    <text x="768" y="940" fill="#89b4fa">Powerful.</text>
  </g>
</svg>
