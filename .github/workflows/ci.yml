name: CI

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # Fast-path: skip redundant merge-queue re-checks when the synthetic
  # commit is directly against main (no other PRs queued ahead).
  # =====================================================================
  skip-if-clean:
    name: Skip if merge_queue produces no diff
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Merge Queue CI Check Skipper
        id: merge-queue-ci-skipper
        uses: ./.github/merge-queue-ci-skipper
        with:
          secret: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check merge_group synthetic commit
        id: check
        run: |
          # PR mode: never skip
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ steps.merge-queue-ci-skipper.outputs.skip-check }}" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-and-check:
    runs-on: ubuntu-latest
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # --- Install Nix via Determinate Systems ---
      - name: Set up Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3

      - name: Use Determinate Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false
          use-gha-cache: false

      # --- Enter your flake's devShell (same behavior as direnv) ---
      - name: Run checks in devShell
        run: |
          nix develop --impure --command bash -e -c '
            set -euxo pipefail
            pre-commit run --all-files
          '

  # Run cargo coverage. This will generate a coverage report and upload it to codecov.
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      # --- Install Nix ---
      - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask coverage
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Run cargo check. This is a fast way to catch any obvious errors in the code.
  check:
    name: Check ${{ matrix.os }} ${{ matrix.toolchain }}
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm]
        # We target the MSRV (currently 1.95.0, matching stable) plus nightly.
        # When stable advances beyond MSRV, add the explicit MSRV version back to avoid double-compiling.
        toolchain: ["stable", "nightly"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask check

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - skip-if-clean
      - build-and-check
      - coverage
      - check
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          echo "skip-if-clean:   ${{ needs.skip-if-clean.outputs.skip }}"
          echo "build-and-check: ${{ needs.build-and-check.result }}"
          echo "coverage:        ${{ needs.coverage.result }}"
          echo "check:           ${{ needs.check.result }}"

          # Fast-path: if the merge queue skipper determined no re-check
          # is needed, all downstream jobs were skipped — that is success.
          if [[ "${{ needs.skip-if-clean.outputs.skip }}" == "true" ]]; then
            echo "✅ Merge queue fast-path: checks skipped (already validated on PR)"
            exit 0
          fi

          if [[ "${{ needs.build-and-check.result }}" != "success" ]]; then
            echo "❌ build-and-check failed"
            exit 1
          fi

          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "❌ coverage failed"
            exit 1
          fi

          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "❌ check matrix failed"
            exit 1
          fi

          echo "✅ All CI jobs succeeded"
