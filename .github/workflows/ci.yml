name: CI

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # Fast-path: skip redundant merge-queue re-checks when the synthetic
  # commit is directly against main (no other PRs queued ahead).
  # =====================================================================
  skip-if-clean:
    name: Skip if merge_queue produces no diff
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Merge Queue CI Check Skipper
        id: merge-queue-ci-skipper
        uses: ./.github/merge-queue-ci-skipper
        with:
          secret: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check merge_group synthetic commit
        id: check
        run: |
          # PR mode: never skip
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ steps.merge-queue-ci-skipper.outputs.skip-check }}" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-and-check:
    runs-on: ubuntu-latest
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # --- Install Nix via Determinate Systems ---
      - name: Set up Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3

      - name: Use Determinate Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          use-gha-cache: false

      # --- Enter your flake's devShell (same behavior as direnv) ---
      - name: Run checks in devShell
        run: |
          nix develop --impure --command bash -e -c '
            set -euxo pipefail
            pre-commit run --all-files
          '

  # Run cargo coverage. This will generate a coverage report and upload it to codecov.
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
      # --- Install Nix ---
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Run clippy with `-D warnings` on every target OS, on stable + MSRV.
  # `cargo xtask check` runs clippy (a superset of `cargo check`) with
  # warnings denied, so this matrix is a genuine cross-platform
  # fail-on-warning gate — it catches OS-specific warnings (e.g. `dead_code`
  # for a function whose only non-test caller is behind `#[cfg(...)]` on
  # another platform) that would otherwise only surface downstream.
  check:
    name: Check ${{ matrix.os }} ${{ matrix.toolchain }}
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm]
        # Stable + MSRV only. Nightly is deliberately excluded: `xtask check`
        # runs clippy with `-D warnings`, and nightly clippy churns new lints
        # that frequently suggest unstable APIs (e.g. `chunks_exact_to_as_chunks`
        # -> `as_chunks_mut`, which does not exist on stable/MSRV). Gating CI on
        # nightly clippy would make the build fail on lint drift we cannot act
        # on without breaking the MSRV.
        toolchain: ["stable", "1.95.0"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ matrix.toolchain }}
          # `cargo xtask check` runs clippy. dtolnay/rust-toolchain omits
          # clippy for pinned-version toolchains (only the named @stable /
          # @nightly entry points bundle it), so request it explicitly.
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask check

  # Run the test suite natively on every target platform. The `check`
  # matrix above only compiles (`cargo xtask check`); it never runs the
  # tests, and `build-and-check` runs them on Linux only. Platform-specific
  # test failures — e.g. macOS's 31-char POSIX shm-name limit surfacing as
  # `ENAMETOOLONG` where Linux allows 255 — are invisible without this job.
  #
  # Windows cannot be tested under Nix, so this native matrix is the sole
  # cross-platform test gate for Windows and macOS. A single toolchain is
  # used deliberately: test behavior differs by *platform*, not by compiler
  # version, and the multi-toolchain sweep is already covered by `check`.
  test:
    name: Test ${{ matrix.os }}
    needs: skip-if-clean
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask test

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - skip-if-clean
      - build-and-check
      - coverage
      - check
      - test
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          echo "skip-if-clean:   ${{ needs.skip-if-clean.outputs.skip }}"
          echo "build-and-check: ${{ needs.build-and-check.result }}"
          echo "coverage:        ${{ needs.coverage.result }}"
          echo "check:           ${{ needs.check.result }}"
          echo "test:            ${{ needs.test.result }}"

          # Fast-path: if the merge queue skipper determined no re-check
          # is needed, all downstream jobs were skipped — that is success.
          if [[ "${{ needs.skip-if-clean.outputs.skip }}" == "true" ]]; then
            echo "✅ Merge queue fast-path: checks skipped (already validated on PR)"
            exit 0
          fi

          if [[ "${{ needs.build-and-check.result }}" != "success" ]]; then
            echo "❌ build-and-check failed"
            exit 1
          fi

          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "❌ coverage failed"
            exit 1
          fi

          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "❌ check matrix failed"
            exit 1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ test matrix failed"
            exit 1
          fi

          echo "✅ All CI jobs succeeded"
