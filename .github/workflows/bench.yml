name: Benchmark Regression Check

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch: {} # Manual trigger

permissions:
  contents: read

concurrency:
  group: benchmark
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Download previous benchmark results
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: target/criterion
          key: bench-criterion-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-criterion-${{ runner.os }}-

      - name: Run benchmarks
        run: >
          cargo bench
          --bench render_loop_bench
          --bench buffer_row_bench
          --bench buffer_benches
          -- --save-baseline current

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: target/criterion
          retention-days: 90

      # Note: Criterion stores comparison data in target/criterion when a
      # previous baseline exists. The cache step above restores it so each
      # run can compare against the prior week. Regressions are visible in
      # the Criterion HTML reports (uploaded as artifacts) and in the raw
      # terminal output above.
      #
      # The 20% regression threshold is enforced by human review of the
      # Criterion output, not by an automated gate. CI runner noise makes
      # automated gating unreliable. If a future Criterion-based comparison
      # tool is adopted, it can be added here.
